name: Build ImmortalWrt

on:
  workflow_dispatch: # 手动触发编译

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Update & Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configuration Customization
        run: |
          # 这里可以放你的 .config 文件，或者执行修改配置的命令
          # 比如：cp my_config .config && make defconfig
          make defconfig

      - name: Download package
        run: make download -j8

      - name: Compile the firmware
        run: make -j$(nproc) || make -j1 V=s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_firmware
          path: bin/targets/
